<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photo Gallery</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="header">
    <h1>Gallery 📷</h1>
    <p>See the charm of our cozy rental and its surroundings.</p>

  <main class="gallery-grid">

    <img src="images/opt-house02.jpg" alt="Living Room" class="gallery-image" />
    <img src="images/opt-house03.jpg" alt="Bedroom" class="gallery-image" />
    <img src="images/opt-house04.jpg" alt="Kitchen" class="gallery-image" />
    <img src="images/opt-house05.jpg" alt="Patio" class="gallery-image" />
    <img src="images/opt-house06.jpg" alt="Sunset View" class="gallery-image" />
    <img src="images/opt-house07.jpg" alt="Backyard" class="gallery-image" />
    <img src="images/opt-house08.jpg" alt="Dining Area" class="gallery-image" />
    <img src="images/opt-house09.jpg" alt="Exterior Night" class="gallery-image" />
  </main>

</body>
</html>
